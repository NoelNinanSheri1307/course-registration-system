apiVersion: apps/v1
kind: Deployment
metadata:
  name: course-app-v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: course-app-v1
  template:
    metadata:
      labels:
        app: course-app-v1
    spec:
      containers:
      - name: course-app
        image: noelninan1307/course-app:v1
        ports:
        - containerPort: 3000
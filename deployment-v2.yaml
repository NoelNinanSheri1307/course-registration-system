apiVersion: apps/v1
kind: Deployment
metadata:
  name: course-app-v2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: course-app-v2
  template:
    metadata:
      labels:
        app: course-app-v2
    spec:
      containers:
      - name: course-app
        image: noelninan1307/course-app:v2
        imagePullPolicy: Always
        ports:
        - containerPort: 3000